[Content]
# Make the image usable as an initramfs to allow us to hack around early in the
# boot process. This allows the installer to run before the full system boots.
MakeInitrd=yes
Packages=
    dosfstools
    e2fsprogs
    efibootmgr
    initramfs-tools
    kexec-tools
    systemd-boot
    systemd-boot-efi
    systemd-repart
